name: Pull Request

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # e2e usa o Chrome pré-instalado do runner (PUPPETEER_EXECUTABLE_PATH),
      # então pular o download do Chrome do puppeteer evita o hang no install.
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Use runner's pre-installed Chrome for e2e
        run: echo "PUPPETEER_EXECUTABLE_PATH=${CHROME_BIN:-/usr/bin/google-chrome}" >> "$GITHUB_ENV"

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
